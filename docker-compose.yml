services:
  ai-data-analyst-postgres:
    image: postgres:15-alpine
    container_name: ai-data-analyst-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: industry_assistant
      TZ: Asia/Shanghai
    ports:
      - "5433:5432"
    volumes:
      - ai_data_analyst_postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_data_analyst_network

  ai-data-analyst-redis:
    image: redis:7-alpine
    container_name: ai-data-analyst-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - ai_data_analyst_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_data_analyst_network

  ai-data-analyst-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ai-data-analyst-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ai_data_analyst_etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD-SHELL", "etcdctl endpoint health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai_data_analyst_network

  ai-data-analyst-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: ai-data-analyst-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - ai_data_analyst_minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai_data_analyst_network

  ai-data-analyst-milvus:
    image: milvusdb/milvus:v2.3.3
    container_name: ai-data-analyst-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: ai-data-analyst-etcd:2379
      MINIO_ADDRESS: ai-data-analyst-minio:9000
    volumes:
      - ai_data_analyst_milvus_data:/var/lib/milvus
    ports:
      - "19531:19530"
      - "9092:9091"
    depends_on:
      - ai-data-analyst-etcd
      - ai-data-analyst-minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai_data_analyst_network

  ai-data-analyst-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: ai-data-analyst-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "1201:9200"
    volumes:
      - ai_data_analyst_es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ai_data_analyst_network

  ai-data-analyst-backend:
    build:
      context: ./backend/app
      dockerfile: Dockerfile
    container_name: ai-data-analyst-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: ai-data-analyst-postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: ai-data-analyst-redis
      REDIS_PORT: 6379
      MILVUS_HOST: ai-data-analyst-milvus
      MILVUS_PORT: 19530
    ports:
      - "8001:8000"
    depends_on:
      - ai-data-analyst-postgres
      - ai-data-analyst-redis
      - ai-data-analyst-etcd
      - ai-data-analyst-minio
      - ai-data-analyst-milvus
      - ai-data-analyst-elasticsearch
    networks:
      - ai_data_analyst_network

volumes:
  ai_data_analyst_postgres_data:
  ai_data_analyst_redis_data:
  ai_data_analyst_etcd_data:
  ai_data_analyst_minio_data:
  ai_data_analyst_milvus_data:
  ai_data_analyst_es_data:

networks:
  ai_data_analyst_network:
    driver: bridge
